    <script>
// 1. Registro del componente con manejo de errores y ciclos de vida limpios
AFRAME.registerComponent('smart-video-player', {
    init: function () {
        this.video = document.querySelector(this.el.getAttribute('src'));
        this.dataSrc = this.video.getAttribute('data-src');
        this.isLoaded = false;

        // Escuchar el evento de 'targetFound'
        this.el.parentEl.addEventListener('targetFound', () => {
            this.playVideo();
        });

        // Escuchar el evento de 'targetLost'
        this.el.parentEl.addEventListener('targetLost', () => {
            this.stopVideo();
        });
    },

    playVideo: function() {
        if (!this.video) return;

        // Solo asignar src si no tiene uno activo (ahorra CPU)
        if (!this.video.src || this.video.src === window.location.href || this.video.src === "") {
            this.video.src = this.dataSrc;
            this.video.load();
        }

        // Usar setTimeout para no bloquear el hilo de la cámara inmediatamente
        setTimeout(() => {
            this.video.play().catch(err => console.warn("Video bloqueado:", err));
        }, 50);
    },

    stopVideo: function() {
        if (!this.video) return;
        this.video.pause();
        
        // Liberar memoria SOLO si es necesario (iOS) sin romper el objeto
        if (AFRAME.utils.device.isIOS()) {
            this.video.removeAttribute('src'); 
            this.video.load();
        }
    }
});

// 2. Manejo del botón de inicio y permisos
document.getElementById('startButton').addEventListener('click', function() {
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'none';

    // "Desbloqueo" global de audio/video para navegadores móviles
    const sceneEl = document.querySelector('a-scene');
    if (sceneEl.hasLoaded) {
        runPostClick();
    } else {
        sceneEl.addEventListener('loaded', runPostClick);
    }
});

function runPostClick() {
    // Esto asegura que la cámara de MindAR no se detenga por falta de interacción
    const videoElements = document.querySelectorAll('video');
    videoElements.forEach(v => {
        v.muted = false; // Aseguramos que el audio esté disponible
        // Intento de reproducción fantasma para validar el canal de datos
        v.play().then(() => v.pause()).catch(() => {});
    });
}
