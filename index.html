    <script>
        // Componente para manejar carga y reproducción inteligente
        AFRAME.registerComponent('smart-video-player', {
            init: function () {
                const video = document.querySelector(this.el.getAttribute('src'));
                
                this.el.parentEl.addEventListener('targetFound', () => {
                    // Si no tiene fuente, la cargamos en el momento
                    if (!video.src || video.src === "") {
                        video.src = video.getAttribute('data-src');
                        video.load();
                    }
                    video.play();
                });

                this.el.parentEl.addEventListener('targetLost', () => {
                    video.pause();
                });
            }
        });

        // Botón de inicio para cumplir políticas de Safari/Chrome
        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
        });
    </script>
