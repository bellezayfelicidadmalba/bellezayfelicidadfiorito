<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="UTF-8">
<title>MALBA RA PRO</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
#overlay {
  position:fixed;
  width:100%; height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
button { padding:15px 30px; font-size:18px; }
</style>
</head>

<body>

<div id="overlay">
  <h2>Belleza y Felicidad Fiorito</h2>
  <button id="startButton">INICIAR</button>
</div>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1; filterBeta:0.1; filterMinCF:0.02;"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
>

<a-assets>

<video id="vid0" muted playsinline crossorigin="anonymous"></video>
<video id="vid1" muted playsinline crossorigin="anonymous"></video>
<video id="vid2" muted playsinline crossorigin="anonymous"></video>
<video id="vid3" muted playsinline crossorigin="anonymous"></video>
<video id="vid4" muted playsinline crossorigin="anonymous"></video>
<video id="vid5" muted playsinline crossorigin="anonymous"></video>
<video id="vid6" muted playsinline crossorigin="anonymous"></video>
<video id="vid7" muted playsinline crossorigin="anonymous"></video>
<video id="vid8" muted playsinline crossorigin="anonymous"></video>
<video id="vid9" muted playsinline crossorigin="anonymous"></video>
<video id="vid10" muted playsinline crossorigin="anonymous"></video>

</a-assets>

<a-camera position="0 0 0"></a-camera>

<!-- SOLO UN WRAPPER POR TARGET -->
<a-entity id="target0" mindar-image-target="targetIndex:0">
  <a-video src="#vid0" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target1" mindar-image-target="targetIndex:1">
  <a-video src="#vid1" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target2" mindar-image-target="targetIndex:2">
  <a-video src="#vid2" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target3" mindar-image-target="targetIndex:3">
  <a-video src="#vid3" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target4" mindar-image-target="targetIndex:4">
  <a-video src="#vid4" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target5" mindar-image-target="targetIndex:5">
  <a-video src="#vid5" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target6" mindar-image-target="targetIndex:6">
  <a-video src="#vid6" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target7" mindar-image-target="targetIndex:7">
  <a-video src="#vid7" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target8" mindar-image-target="targetIndex:8">
  <a-video src="#vid8" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target9" mindar-image-target="targetIndex:9">
  <a-video src="#vid9" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

<a-entity id="target10" mindar-image-target="targetIndex:10">
  <a-video src="#vid10" width="3" height="5" material="shader: flat"></a-video>
</a-entity>

</a-scene>

<script>

const sources = [
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772938685/1_COMEDOR_GOURMET_REPARTO_TUPPERS_480_hxse1v.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908740/2_TALLER_NINIES_480_oidhcn.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908741/3_SERIGRAFIA480_bs3bnn.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908740/4_TALLER_CERAMICA_ADULTO_480_mze0hn.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1773112691/5_LA_JOYA_tjnvge.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908744/6_TALLER_COSTURA_DELANTALES_480_wnhiyo.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908747/7_VEREDAS_FIORITO_CHICAS_BAILANDO_i1muut.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908745/8_VEREDAS_FIORITO_HELADOS_480_fdzlhs.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908748/9_VEREDAS_FIORITO_NINIES_CAMINANDO_480_rlx0my.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908750/10_VEREDAS_FIORITO_NINIES_480_dkxfpd.mp4",
"https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772908751/11_VEREDAS_FIORITO_POLICIA_480_m3e72k.mp4"
];

let currentVideo = null;
let locked = false;
let stableCount = 0;

const sceneEl = document.querySelector('a-scene');

document.getElementById('startButton').addEventListener('click', async () => {

  document.getElementById('overlay').style.display = 'none';

  document.querySelectorAll('video').forEach((v,i)=>{
    v.src = sources[i];
  });

  await sceneEl.systems["mindar-image-system"].start();
});

// 🔴 BLOQUEO REAL DE TRACKING
document.querySelectorAll('[mindar-image-target]').forEach((target, index) => {

  target.addEventListener('targetFound', async () => {

    const vid = document.querySelector(`#vid${index}`);

    if(currentVideo && currentVideo !== vid){
      currentVideo.pause();
      currentVideo.currentTime = 0;
    }

    vid.muted = false;
    try { await vid.play(); } catch(e){}

    currentVideo = vid;

    locked = false;
    stableCount = 0;
  });

  target.addEventListener('targetLost', () => {

    const vid = document.querySelector(`#vid${index}`);
    vid.pause();
    vid.currentTime = 0;

    locked = false;
    stableCount = 0;
  });

});

// 🔥 ANTI-JITTER DEFINITIVO
AFRAME.registerComponent('hard-lock', {
  init: function () {
    this.lastPos = new THREE.Vector3();
  },
  tick: function () {

    const pos = this.el.object3D.position;

    const dist = this.lastPos.distanceTo(pos);

    if (dist < 0.001) stableCount++;
    else stableCount = 0;

    if (stableCount > 10) locked = true;

    if (locked) {
      this.el.object3D.position.copy(this.lastPos);
    } else {
      this.lastPos.copy(pos);
    }
  }
});

// aplicar a todos
document.querySelectorAll('[mindar-image-target]').forEach(el=>{
  el.setAttribute('hard-lock','');
});

</script>

</body>
</html>
