    <script>
AFRAME.registerComponent('smart-video-player', {
    init: function () {
        this.video = document.querySelector(this.el.getAttribute('src'));
        this.dataSrc = this.video.getAttribute('data-src');

        this.el.parentEl.addEventListener('targetFound', () => {
            console.log("Target encontrado");
            
            // Si el video no tiene fuente o está vacío, se la asignamos
            if (!this.video.src || this.video.src === window.location.href || this.video.src === "") {
                this.video.src = this.dataSrc;
                this.video.load();
            }

            // Reproducción con manejo de promesa para evitar bloqueos
            this.video.play().catch(err => {
                console.warn("Error al reproducir:", err);
            });
        });

        this.el.parentEl.addEventListener('targetLost', () => {
            console.log("Target perdido");
            this.video.pause();

            // En lugar de borrar el src, lo "vaciamos" de forma suave
            // Esto libera RAM en iOS sin romper el nodo en Android
            if (AFRAME.utils.device.isIOS()) {
                this.video.src = ""; 
                this.video.load();
            }
        });
    }
});

// Botón de inicio: Crucial para "despertar" los videos en iOS/Android
document.getElementById('startButton').addEventListener('click', () => {
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'none';

    // "Despertar" todos los videos con un play/pause rápido
    // Esto quita el bloqueo de reproducción automática de los navegadores
    const allVideos = document.querySelectorAll('video');
    allVideos.forEach(v => {
        v.play().then(() => {
            v.pause();
            v.currentTime = 0;
        }).catch(() => {
            // Silenciamos el error si el navegador bloquea el "pre-despertar"
        });
    });
});
