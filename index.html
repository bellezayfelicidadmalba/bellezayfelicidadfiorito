<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="UTF-8">
<title>Experiencia RA PRO</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

#overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
    text-align:center;
}
button {
    padding:16px 32px;
    font-size:18px;
    border-radius:30px;
    border:none;
}
</style>
</head>

<body>

<div id="overlay">
    <h2>BELLEZA Y FELICIDAD FIORITO. MALBA</h2>
    <p>Apunta a los marcadores</p>
    <button id="startButton">INICIAR</button>
</div>

<a-scene
 mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1; filterMinCF:0.01; filterBeta:0.1"
 color-space="sRGB"
 renderer="precision: mediump; antialias:true; logarithmicDepthBuffer:true;"
 vr-mode-ui="enabled: false"
 device-orientation-permission-ui="enabled: false"
 embedded
>

<a-assets>

<!-- videos -->
<script>
for(let i=0;i<12;i++){
  const v=document.createElement("video");
  v.id="vid"+i;
  v.setAttribute("preload","none");
  v.setAttribute("playsinline","");
  v.setAttribute("webkit-playsinline","");
  v.crossOrigin="anonymous";
  document.currentScript.parentNode.appendChild(v);
}
</script>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<!-- targets con contenedor estabilizador -->
<script>
for(let i=0;i<12;i++){
  document.write(`
  <a-entity mindar-image-target="targetIndex:${i}">
    <a-entity class="anchor" visible="false">
      <a-video src="#vid${i}" width="3" height="5"></a-video>
    </a-entity>
  </a-entity>
  `);
}
</script>

</a-scene>

<script>

const sources = [/* TUS URLS IGUAL */];

let currentVideo = null;
let anchors = [];
let initialized = false;

const sceneEl = document.querySelector('a-scene');

// INIT BUTTON
document.getElementById('startButton').addEventListener('click', async () => {

    document.getElementById('overlay').style.display = 'none';

    // carga progresiva REAL (clave para Cloudflare)
    document.querySelectorAll('video').forEach((v,i)=>{
        v.src = sources[i];
        v.load();
    });

    await sceneEl.systems["mindar-image-system"].start();
    initialized = true;
});

// estabilizador tipo "lock"
document.querySelectorAll('[mindar-image-target]').forEach((target, index) => {

    const anchor = target.querySelector('.anchor');
    anchors.push(anchor);

    let locked = false;
    let lastMatrix = new THREE.Matrix4();

    target.addEventListener('targetFound', async () => {

        const vid = document.querySelector(`#vid${index}`);

        // apagar anterior
        if(currentVideo && currentVideo !== vid){
            currentVideo.pause();
            currentVideo.currentTime = 0;
        }

        // 🔥 LOCK DE POSICIÓN (anti vibración)
        target.object3D.updateMatrixWorld(true);
        lastMatrix.copy(target.object3D.matrixWorld);
        anchor.object3D.matrix.copy(lastMatrix);
        anchor.object3D.matrix.decompose(
            anchor.object3D.position,
            anchor.object3D.quaternion,
            anchor.object3D.scale
        );

        anchor.setAttribute("visible", true);
        locked = true;

        vid.muted = false;
        await vid.play();

        currentVideo = vid;
    });

    target.addEventListener('targetLost', () => {

        const vid = document.querySelector(`#vid${index}`);

        vid.pause();
        vid.currentTime = 0;

        anchor.setAttribute("visible", false);
        locked = false;

        currentVideo = null;
    });

    // actualización suave (híbrido real)
    sceneEl.addEventListener("renderstart", () => {

        sceneEl.addEventListener("tick", () => {

            if(!locked) return;

            target.object3D.updateMatrixWorld(true);

            // interpolación suave
            lastMatrix.lerp(target.object3D.matrixWorld, 0.15);

            anchor.object3D.matrix.copy(lastMatrix);
            anchor.object3D.matrix.decompose(
                anchor.object3D.position,
                anchor.object3D.quaternion,
                anchor.object3D.scale
            );

        });

    });

});

// errores
sceneEl.addEventListener('arError', (e)=>{
    alert("Error AR: revisar HTTPS / permisos cámara");
    console.error(e);
});

</script>

</body>
</html>
